<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 100px; 
            background-color: #f4f4f9;
            color: #333;
        }
        .error-box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            display: inline-block; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { 
            font-size: 4rem; 
            margin: 0; 
            color: #e74c3c; 
        }
        h2 {
            margin-top: 10px;
            color: #555;
        }
        p { 
            margin-bottom: 25px; 
            line-height: 1.5;
        }
        .home-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .home-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>File Not Found</h2>
        <p>The URI you requested does not exist in the <strong>public/</strong> directory of this C++ micro-server.</p>
        <a href="/" class="home-btn">Return to Index</a>
    </div>
</body>
</html>
